name: Build
on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
        description: 'The name of the plugin (e.g. woocommerce-shipping-dhl)'
    outputs:
      plugin_name:
        description: "The name of the plugin"
        value: ${{ jobs.build.outputs.plugin_name }}

jobs:
  build:
    name: Build plugin artifact (zip file)
    runs-on: ubuntu-20.04
    outputs:
      plugin_name: ${{ inputs.plugin_name }}
    env:
      PLUGIN_NAME: ${{ inputs.plugin_name }}
    steps:
      - name: Set Git to use HTTPS instead of SSH
        run: git config --global url.https://github.com/.insteadOf git://github.com/

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Install npm dependencies
        run: npm ci

      - name: Install production PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Build plugin zip
        run: npm run build

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: ${{ env.PLUGIN_NAME }}.zip 
